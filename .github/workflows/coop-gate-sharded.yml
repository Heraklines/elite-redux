name: Co-op Gate (Sharded)

on:
  workflow_dispatch:
  push:
    branches:
      - feat/elite-redux-port
    paths:
      - ".github/workflows/coop-gate-sharded.yml"
      - ".github/actions/setup-deps/**"
      - ".nvmrc"
      - "assets"
      - "assets/**"
      - "biome.json*"
      - "index.css"
      - "index.html"
      - "locales"
      - "locales/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "patches/**"
      - "public/**"
      - "scripts/run-coop-gate.mjs"
      - "scripts/run-coop-static-gate.mjs"
      - "scripts/run-coop-browser-transport.mjs"
      - "src/**"
      - "test/**"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "workers/**"

concurrency:
  group: coop-gate-sharded-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser:
    name: Browser-native WebRTC handshake and rejoin
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-deps

      - name: Install isolated Chrome runtime
        run: pnpm exec puppeteer browsers install chrome

      - name: Run two-context production transport checkpoint
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: node scripts/run-coop-browser-transport.mjs

      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coop-browser-transport
          path: dev-logs/coop-browser/**
          retention-days: 7
          if-no-files-found: warn

  static:
    name: Co-op static type and format gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/setup-deps

      - name: Resolve last successful full-gate base
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          base="$(
            gh api \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/coop-gate-sharded.yml/runs?branch=feat%2Felite-redux-port&status=success&per_page=10" \
              --jq ".workflow_runs[] | select(.head_sha != \"${GITHUB_SHA}\") | .head_sha" \
              | head -n 1
          )"
          if [ -z "$base" ]; then
            base="${{ github.event.before }}"
          fi
          echo "COOP_BASE_SHA=$base" >> "$GITHUB_ENV"

      - name: Check changed-file types, formatting, and lint
        run: node scripts/run-coop-static-gate.mjs

  gate:
    if: github.repository == 'Heraklines/elite-redux'
    name: Lane ${{ matrix.lane }} shard ${{ matrix.shard }}/${{ matrix.total }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { lane: A, shard: 1, total: 1 }
          - { lane: B, shard: 1, total: 8 }
          - { lane: B, shard: 2, total: 8 }
          - { lane: B, shard: 3, total: 8 }
          - { lane: B, shard: 4, total: 8 }
          - { lane: B, shard: 5, total: 8 }
          - { lane: B, shard: 6, total: 8 }
          - { lane: B, shard: 7, total: 8 }
          - { lane: B, shard: 8, total: 8 }
          - { lane: C, shard: 1, total: 3 }
          - { lane: C, shard: 2, total: 3 }
          - { lane: C, shard: 3, total: 3 }
          - { lane: P, shard: 1, total: 1 }
          - { lane: S, shard: 1, total: 3 }
          - { lane: S, shard: 2, total: 3 }
          - { lane: S, shard: 3, total: 3 }
          - { lane: T, shard: 1, total: 1 }
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-deps

      - name: Run isolated co-op gate shard
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        shell: bash
        run: |
          set -o pipefail
          node scripts/run-coop-gate.mjs \
            --lane "${{ matrix.lane }}" \
            --shard "${{ matrix.shard }}/${{ matrix.total }}" \
            2>&1 | tee "coop-gate-${{ matrix.lane }}-${{ matrix.shard }}-of-${{ matrix.total }}.log"

      - name: Upload shard diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coop-gate-${{ matrix.lane }}-${{ matrix.shard }}-of-${{ matrix.total }}
          path: |
            coop-gate-${{ matrix.lane }}-${{ matrix.shard }}-of-${{ matrix.total }}.log
            dev-logs/coop-duo/**
            dev-logs/coop-soak/**
            .vitest-reports/**
          retention-days: 7
          if-no-files-found: warn

  coop-required:
    name: Co-op required aggregate
    if: always()
    needs: [browser, static, gate]
    runs-on: ubuntu-latest
    steps:
      - name: Require every co-op checkpoint job
        env:
          BROWSER_RESULT: ${{ needs.browser.result }}
          STATIC_RESULT: ${{ needs.static.result }}
          GATE_RESULT: ${{ needs.gate.result }}
        run: |
          test "$BROWSER_RESULT" = success
          test "$STATIC_RESULT" = success
          test "$GATE_RESULT" = success
