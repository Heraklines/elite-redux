name: Deploy Production

# Rebuilds the standalone (login) bundle, deploys the production cloud-save
# Worker, then deploys the elite-redux PRODUCTION Cloudflare Pages project.
# VITE_DEV_TOOLS and the co-op bindings are NEVER set in production.
#
# Manual dispatch ONLY, and only after the maintainer explicitly approves a
# production release.

on:
  workflow_dispatch:
    inputs:
      asset_host:
        description: "Asset CDN host. Blank = jsDelivr (normal). 'raw' = serve er-assets from raw.githubusercontent.com (jsDelivr-outage stopgap; redeploy blank to revert)."
        required: false
        type: string

concurrency:
  group: deploy-prod
  # Do not cancel between the Worker and Pages steps and expose mismatched contracts.
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository == 'Heraklines/elite-redux'
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          # No submodules: standalone asset metadata is vendored (see staging).

      - name: Seal exact promotion source
        run: echo "PROMOTED_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - uses: ./.github/actions/setup-deps

      - name: Stage standalone asset metadata
        run: |
          mkdir -p assets
          cp -v deploy/standalone-assets/* assets/

      - name: Write standalone login env (PROD - no dev tools)
        run: |
          {
            echo "VITE_BYPASS_LOGIN=0"
            echo "VITE_SERVER_URL=https://er-save-api.heraklines.workers.dev"
            echo "VITE_SERVER_URL_TELEMETRY=https://er-telemetry.heraklines.workers.dev"
          } > .env.standalone.local

      # ER (#431): resolve the CURRENT er-assets HEAD so this deploy's _redirects
      # pin is never stale (mirrors deploy-staging.yml). Without this, prod kept the
      # committed - and stale - pin, so brand-new atlas frames (e.g. the TM Case
      # icon) 404'd / fell back to the wrong sprite while staging looked fine.
      # Best-effort: an API failure keeps the committed pin and never blocks a deploy.
      - name: Resolve er-assets HEAD for the jsDelivr pin
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(gh api repos/Heraklines/er-assets/commits/main --jq .sha || true)
          if echo "$SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "ER_ASSETS_SHA=$SHA" >> "$GITHUB_ENV"
            echo "er-assets pin for this deploy: $SHA"
          else
            echo "WARNING: could not resolve er-assets HEAD - keeping the committed pin."
          fi
          # Asset CDN host: blank = jsDelivr (normal). 'raw' = serve er-assets from
          # raw.githubusercontent.com (jsDelivr-outage stopgap). Redeploy blank to revert.
          if [ "${{ github.event.inputs.asset_host }}" = "raw" ]; then
            echo "ER_ASSETS_HOST=raw" >> "$GITHUB_ENV"
            echo "asset host OVERRIDE: raw.githubusercontent.com (jsDelivr bypass)"
          fi

      - name: Build standalone bundle
        run: |
          mkdir -p assets
          cp -f deploy/standalone-assets/* assets/
          pnpm build:standalone
        env:
          NODE_ENV: production

      # build:standalone (scripts/assemble-cloudflare-dist.mjs) already copies the
      # Cloudflare config, strips sourcemaps, and re-pins dist/_redirects to
      # $ER_ASSETS_SHA - same as staging. The old manual "Assemble dist" cp step
      # was a leftover that copied the STALE committed _redirects back over the
      # freshly re-pinned one, so prod shipped an outdated er-assets pin (custom
      # backgrounds 404'd / fell back to vanilla). Just verify the assembled dist.
      - name: Verify assembled dist (built by build:standalone)
        run: |
          for f in _redirects _headers service-worker.js manifest.json version.json; do
            test -f "dist/$f" || { echo "MISSING dist/$f"; exit 1; }
          done
          echo "=== er-assets pins in dist/_redirects ==="
          grep -o 'er-assets@[0-9a-f]*' dist/_redirects | sort -u

      - name: Verify production promotion contract
        run: node --test test/browser/coop-public-ui/deploy-prod-contract.test.mjs

      # The production browser depends on the save/ghost routes from this exact
      # checkout. Publish the backward-compatible Worker before the browser.
      - name: Deploy cloud-save API (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config workers/er-save-api/wrangler.toml

      - name: Deploy to Cloudflare Pages (PRODUCTION)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name elite-redux --branch main --commit-dirty=true
