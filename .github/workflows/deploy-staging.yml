name: Deploy Staging

# Rebuilds the standalone (login) bundle and deploys it to the
# elite-redux-staging Cloudflare Pages project. Triggered manually from the
# Actions tab OR automatically by the team editor's "Commit & Deploy" button
# (the er-editor-api Worker fires a workflow_dispatch after committing).
#
# Required GitHub repo config (Settings → Secrets and variables → Actions):
#   secrets.CLOUDFLARE_API_TOKEN   — token with Pages:Edit on the account
#   secrets.CLOUDFLARE_ACCOUNT_ID  — Cloudflare account id
#   vars.STAGING_SERVER_URL        — save API base, e.g. https://er-save-api-staging.<sub>.workers.dev
# The Cloudflare account must contain a dedicated `er-coop-staging` D1. The
# workflow resolves it by exact name and refuses production's D1 id.

run-name: ${{ inputs.operation == 'import_music' && 'Import YouTube BGM' || 'Deploy Staging' }}

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Staging operation
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - import_music
      source_urls:
        description: YouTube video or playlist URLs, one per line
        required: false
        type: string
      key_prefix:
        description: Lowercase asset key prefix
        required: false
        default: battle_custom
        type: string
      split_chapters:
        description: Split YouTube chapters and timestamp lists
        required: false
        default: true
        type: boolean
      require_creative_commons:
        description: Reject standard or unknown licenses
        required: false
        default: false
        type: boolean
      deploy_staging:
        description: Deploy staging after the import
        required: false
        default: true
        type: boolean
      author:
        description: Staff attribution for the catalog entry
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ inputs.operation == 'import_music' && 'er-youtube-bgm-import' || 'deploy-staging' }}
  # Queue every promotion. Cancelling between Worker and Pages deploys can expose mismatched
  # save/co-op protocol versions to staging players.
  cancel-in-progress: false

jobs:
  import_music:
    if: github.repository == 'Heraklines/elite-redux' && inputs.operation == 'import_music'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install media tools
        run: |
          python -m pip install --disable-pip-version-check yt-dlp
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Check asset repository token
        env:
          ASSETS_TOKEN: ${{ secrets.ER_ASSETS_TOKEN }}
        run: |
          if [ -z "$ASSETS_TOKEN" ]; then
            echo "ER_ASSETS_TOKEN must grant Contents read/write on Heraklines/er-assets." >&2
            exit 1
          fi

      - name: Check out ER assets
        env:
          ASSETS_TOKEN: ${{ secrets.ER_ASSETS_TOKEN }}
        run: git clone --depth 1 "https://x-access-token:${ASSETS_TOKEN}@github.com/Heraklines/er-assets.git" "$RUNNER_TEMP/er-assets"

      - name: Import and normalize tracks
        env:
          SOURCE_URLS: ${{ inputs.source_urls }}
          KEY_PREFIX: ${{ inputs.key_prefix }}
          SPLIT_CHAPTERS: ${{ inputs.split_chapters }}
          REQUIRE_CREATIVE_COMMONS: ${{ inputs.require_creative_commons }}
          IMPORT_AUTHOR: ${{ inputs.author }}
          ASSETS_DIR: ${{ runner.temp }}/er-assets
          CATALOG_PATH: editor/data/bgm.json
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/import-youtube-bgm.mjs

      - name: Commit audio assets
        working-directory: ${{ runner.temp }}/er-assets
        run: |
          git config user.name "Elite Redux editor"
          git config user.email "editor@elite-redux.invalid"
          git add audio/bgm
          if git diff --cached --quiet; then
            echo "No new audio assets."
          else
            git commit -m "editor: import battle music"
            git push origin HEAD:main
          fi

      - name: Commit music catalog
        run: |
          git config user.name "Elite Redux editor"
          git config user.email "editor@elite-redux.invalid"
          git add editor/data/bgm.json
          if git diff --cached --quiet; then
            echo "No catalog changes."
          else
            git commit -m "editor: update battle music catalog"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

  deploy:
    needs: import_music
    if: always() && github.repository == 'Heraklines/elite-redux' && (inputs.operation == 'deploy' || (inputs.operation == 'import_music' && inputs.deploy_staging && needs.import_music.result == 'success'))
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          # No submodules: the standalone build needs only a handful of small
          # asset-metadata files (the big image/audio dirs ship via jsDelivr).
          # The upstream pokerogue-assets submodule pins a commit that isn't
          # always fetchable, so we vendor those files in deploy/standalone-assets.

      - name: Seal exact promotion source
        run: echo "PROMOTED_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - uses: ./.github/actions/setup-deps

      - name: Stage standalone asset metadata
        run: |
          mkdir -p assets
          cp -v deploy/standalone-assets/* assets/
          echo "=== assets/ after stage ==="
          ls -la assets/

      - name: Write standalone login env
        run: |
          {
            echo "VITE_BYPASS_LOGIN=0"
            echo "VITE_SERVER_URL=${{ vars.STAGING_SERVER_URL }}"
            echo "VITE_COOP_SERVER_URL=https://er-coop-api-staging.heraklines.workers.dev"
            echo "VITE_COOP_SIGNALING_PROTOCOL=p33"
            # Stabilization staging exercises the negotiated Authority V2 turn/command cutover. Production
            # remains default-off until its separate all-green promotion qualification.
            echo "VITE_COOP_AUTHORITY_V2_TURN=on"
            # Replacement proposals + complete post-summon state use the same retained V2 log. This remains
            # staging-only until its exact-SHA gate and public-browser campaign qualify it.
            echo "VITE_COOP_AUTHORITY_V2_REPLACEMENT=on"
            # Showdown battle telemetry (D5): dedicated worker + er-telemetry D1.
            # Without this the client falls back to VITE_SERVER_URL (404 no-op).
            echo "VITE_SERVER_URL_TELEMETRY=https://er-telemetry.heraklines.workers.dev"
            # Enable the in-game dev TEST SUITE on STAGING only (Dev Scenarios menu,
            # Pass/Fail, Send Logs). Production's Cloudflare Pages build does NOT set
            # this, so the suite never activates there. See CLAUDE.md.
            echo "VITE_DEV_TOOLS=1"
          } > .env.standalone.local

      # ER (#431): resolve the CURRENT er-assets HEAD so this deploy's
      # _redirects pin can never be stale. The pin used to be bumped by hand;
      # a forgotten bump = players kept old art/audio (or 404'd brand-new
      # assets) for days - the single biggest source of "stale cache" reports.
      # Best-effort: on API failure the committed pin is used (never blocks a
      # deploy, worst case is the old manual-bump behavior).
      - name: Resolve er-assets HEAD for the jsDelivr pin
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(gh api repos/Heraklines/er-assets/commits/main --jq .sha || true)
          if echo "$SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "ER_ASSETS_SHA=$SHA" >> "$GITHUB_ENV"
            echo "er-assets pin for this deploy: $SHA"
          else
            echo "WARNING: could not resolve er-assets HEAD - keeping the committed pin."
          fi

      # jsDelivr caches per-SHA, so a fresh pin is COLD on the CDN edge and the first
      # player fetches after a deploy can transiently fail; the game loader has no
      # retry for the UI atlases, so one failed fetch means a whole session of
      # __MISSING icons (the 2026-07-06 staging report: items/types/species icons all
      # placeholder). Warm + VERIFY the critical UI atlases at the new pin before the
      # build; if the pin will not serve after retries, fall back to the committed
      # (last-good) pin so a deploy can never ship a cold/broken asset base.
      - name: Warm + verify the er-assets pin on jsDelivr
        run: |
          if [ -z "${ER_ASSETS_SHA:-}" ]; then
            echo "no freshly-resolved pin (committed pin in use) - skipping warm."
            exit 0
          fi
          BASE="https://cdn.jsdelivr.net/gh/Heraklines/er-assets@${ER_ASSETS_SHA}"
          FILES="images/items.png images/items.json images/types.png images/types.json images/statuses.png images/statuses.json"
          FAILED=0
          for f in $FILES; do
            ok=0
            for attempt in 1 2 3; do
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$BASE/$f" || echo 000)
              if [ "$code" = "200" ]; then ok=1; echo "warm OK $f"; break; fi
              echo "warm attempt $attempt got $code for $f - retrying"
              sleep 5
            done
            if [ "$ok" != "1" ]; then
              echo "WARM FAILED for $f at pin ${ER_ASSETS_SHA}"
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "::warning::er-assets pin ${ER_ASSETS_SHA} did not fully serve on jsDelivr - falling back to the committed (last-good) pin."
            echo "ER_ASSETS_SHA=" >> "$GITHUB_ENV"
          else
            echo "er-assets pin warmed + verified on jsDelivr."
          fi

      - name: Build standalone bundle
        run: |
          # Re-assert vendored asset metadata immediately before the build, in
          # case anything (submodule sync, install hooks) cleared assets/.
          mkdir -p assets
          cp -f deploy/standalone-assets/* assets/
          echo "=== assets/ right before build ==="
          ls -la assets/
          # build:standalone now also assembles dist (Cloudflare config copy,
          # sourcemap strip, empty manifest.json, ER_ASSETS_SHA re-pin) via
          # scripts/assemble-cloudflare-dist.mjs - same path production uses.
          pnpm build:standalone
        env:
          NODE_ENV: production

      - name: Verify assembled dist
        run: |
          for f in _redirects _headers service-worker.js manifest.json version.json; do
            test -f "dist/$f" || { echo "MISSING dist/$f"; exit 1; }
          done
          echo "=== er-assets pins in dist/_redirects ==="
          grep -o 'er-assets@[0-9a-f]*' dist/_redirects | sort -u

      - name: Verify staging promotion contract
        run: node --test test/browser/coop-public-ui/deploy-staging-contract.test.mjs

      - name: Resolve isolated co-op D1 and seal staging Worker config
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          curl --fail --silent --show-error \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database?name=er-coop-staging" \
            > "$RUNNER_TEMP/coop-d1.json"
          test "$(jq '[.result[] | select(.name == "er-coop-staging")] | length' "$RUNNER_TEMP/coop-d1.json")" = "1"
          STAGING_COOP_D1_ID="$(jq -r '.result[] | select(.name == "er-coop-staging") | .uuid' "$RUNNER_TEMP/coop-d1.json")"
          node scripts/materialize-coop-staging-config.mjs \
            "$STAGING_COOP_D1_ID" "$PROMOTED_SHA" workers/er-coop-api/wrangler.generated.staging.toml

      # Do not mutate either live surface until every fallible build/verification step is green. The Worker
      # goes first so a newly published browser never calls an older save contract. Promotions are queued
      # above, so a run that reaches this point cannot strand the two halves between protocol versions.
      - name: Deploy cloud-save API (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config workers/er-save-api/wrangler.staging.toml

      - name: Deploy co-op signaling API (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config workers/er-coop-api/wrangler.generated.staging.toml

      - name: Verify staging P33 signaling contract
        run: |
          for attempt in $(seq 1 24); do
            if curl --fail --silent --show-error \
              --header 'Cache-Control: no-cache' \
              "https://er-coop-api-staging.heraklines.workers.dev/coop/v3/health?source_sha=${PROMOTED_SHA}&attempt=${attempt}" \
              > "$RUNNER_TEMP/coop-health.json"; then
              if jq -e --arg sha "$PROMOTED_SHA" \
                '.ok == true and .protocol == "er-coop-33" and .identityConfigured == true and .sourceSha == $sha' \
                "$RUNNER_TEMP/coop-health.json" > /dev/null; then
                exit 0
              fi
            fi
            echo "waiting for staging P33 Worker source SHA propagation (attempt ${attempt}/24)"
            sleep 5
          done
          jq '{ok, protocol, identityConfigured, sourceSha}' "$RUNNER_TEMP/coop-health.json" || true
          echo "staging P33 Worker did not attest the promoted source SHA" >&2
          exit 1

      - name: Deploy to Cloudflare Pages (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name elite-redux-staging --branch staging --commit-dirty=true
