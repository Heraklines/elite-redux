name: Deploy Staging

# Rebuilds the standalone (login) bundle and deploys it to the
# elite-redux-staging Cloudflare Pages project. Triggered manually from the
# Actions tab OR automatically by the team editor's "Commit & Deploy" button
# (the er-editor-api Worker fires a workflow_dispatch after committing).
#
# Required GitHub repo config (Settings → Secrets and variables → Actions):
#   secrets.CLOUDFLARE_API_TOKEN   — token with Pages:Edit and Workers Scripts:Edit on the account
#   secrets.CLOUDFLARE_ACCOUNT_ID  — Cloudflare account id
#   vars.STAGING_SERVER_URL        — save API base, e.g. https://er-save-api-staging.<sub>.workers.dev

on:
  workflow_dispatch:

concurrency:
  group: deploy-staging
  # A cancelled run used to leave a newer save Worker serving an older Pages client when cancellation
  # landed between the two deploy steps. Queue promotions so every started contract pair completes.
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository == 'Heraklines/elite-redux'
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          # No submodules: the standalone build needs only a handful of small
          # asset-metadata files (the big image/audio dirs ship via jsDelivr).
          # The upstream pokerogue-assets submodule pins a commit that isn't
          # always fetchable, so we vendor those files in deploy/standalone-assets.

      - uses: ./.github/actions/setup-deps

      - name: Stage standalone asset metadata
        run: |
          mkdir -p assets
          cp -v deploy/standalone-assets/* assets/
          echo "=== assets/ after stage ==="
          ls -la assets/

      - name: Write standalone login env
        run: |
          {
            echo "VITE_BYPASS_LOGIN=0"
            echo "VITE_SERVER_URL=${{ vars.STAGING_SERVER_URL }}"
            # Showdown battle telemetry (D5): dedicated worker + er-telemetry D1.
            # Without this the client falls back to VITE_SERVER_URL (404 no-op).
            echo "VITE_SERVER_URL_TELEMETRY=https://er-telemetry.heraklines.workers.dev"
            # Enable the in-game dev TEST SUITE on STAGING only (Dev Scenarios menu,
            # Pass/Fail, Send Logs). Production's Cloudflare Pages build does NOT set
            # this, so the suite never activates there. See CLAUDE.md.
            echo "VITE_DEV_TOOLS=1"
          } > .env.standalone.local

      # ER (#431): resolve the CURRENT er-assets HEAD so this deploy's
      # _redirects pin can never be stale. The pin used to be bumped by hand;
      # a forgotten bump = players kept old art/audio (or 404'd brand-new
      # assets) for days - the single biggest source of "stale cache" reports.
      # Best-effort: on API failure the committed pin is used (never blocks a
      # deploy, worst case is the old manual-bump behavior).
      - name: Resolve er-assets HEAD for the jsDelivr pin
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(gh api repos/Heraklines/er-assets/commits/main --jq .sha || true)
          if echo "$SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "ER_ASSETS_SHA=$SHA" >> "$GITHUB_ENV"
            echo "er-assets pin for this deploy: $SHA"
          else
            echo "WARNING: could not resolve er-assets HEAD - keeping the committed pin."
          fi

      # jsDelivr caches per-SHA, so a fresh pin is COLD on the CDN edge and the first
      # player fetches after a deploy can transiently fail; the game loader has no
      # retry for the UI atlases, so one failed fetch means a whole session of
      # __MISSING icons (the 2026-07-06 staging report: items/types/species icons all
      # placeholder). Warm + VERIFY the critical UI atlases at the new pin before the
      # build; if the pin will not serve after retries, fall back to the committed
      # (last-good) pin so a deploy can never ship a cold/broken asset base.
      - name: Warm + verify the er-assets pin on jsDelivr
        run: |
          if [ -z "${ER_ASSETS_SHA:-}" ]; then
            echo "no freshly-resolved pin (committed pin in use) - skipping warm."
            exit 0
          fi
          BASE="https://cdn.jsdelivr.net/gh/Heraklines/er-assets@${ER_ASSETS_SHA}"
          FILES="images/items.png images/items.json images/types.png images/types.json images/statuses.png images/statuses.json"
          FAILED=0
          for f in $FILES; do
            ok=0
            for attempt in 1 2 3; do
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$BASE/$f" || echo 000)
              if [ "$code" = "200" ]; then ok=1; echo "warm OK $f"; break; fi
              echo "warm attempt $attempt got $code for $f - retrying"
              sleep 5
            done
            if [ "$ok" != "1" ]; then
              echo "WARM FAILED for $f at pin ${ER_ASSETS_SHA}"
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "::warning::er-assets pin ${ER_ASSETS_SHA} did not fully serve on jsDelivr - falling back to the committed (last-good) pin."
            echo "ER_ASSETS_SHA=" >> "$GITHUB_ENV"
          else
            echo "er-assets pin warmed + verified on jsDelivr."
          fi

      - name: Build standalone bundle
        run: |
          # Re-assert vendored asset metadata immediately before the build, in
          # case anything (submodule sync, install hooks) cleared assets/.
          mkdir -p assets
          cp -f deploy/standalone-assets/* assets/
          echo "=== assets/ right before build ==="
          ls -la assets/
          # build:standalone now also assembles dist (Cloudflare config copy,
          # sourcemap strip, empty manifest.json, ER_ASSETS_SHA re-pin) via
          # scripts/assemble-cloudflare-dist.mjs - same path production uses.
          pnpm build:standalone
        env:
          NODE_ENV: production

      - name: Verify assembled dist
        run: |
          for f in _redirects _headers service-worker.js manifest.json version.json; do
            test -f "dist/$f" || { echo "MISSING dist/$f"; exit 1; }
          done
          echo "=== er-assets pins in dist/_redirects ==="
          grep -o 'er-assets@[0-9a-f]*' dist/_redirects | sort -u

      - name: Verify staging promotion contract
        run: node --test test/browser/coop-public-ui/deploy-staging-contract.test.mjs

      # Do not mutate either live surface until every fallible build/verification step is green. The Worker
      # still goes first so a newly published browser never calls an older save contract; cancel-in-progress
      # is disabled above so a promotion that reaches this point cannot strand the pair between versions.
      - name: Deploy cloud-save API (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config workers/er-save-api/wrangler.staging.toml

      - name: Deploy to Cloudflare Pages (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name elite-redux-staging --branch staging --commit-dirty=true
