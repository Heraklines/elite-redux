name: Deploy Staging

# Rebuilds the standalone (login) bundle and deploys it to the
# elite-redux-staging Cloudflare Pages project. Triggered manually from the
# Actions tab OR automatically by the team editor's "Commit & Deploy" button
# (the er-editor-api Worker fires a workflow_dispatch after committing).
#
# Required GitHub repo config (Settings → Secrets and variables → Actions):
#   secrets.CLOUDFLARE_API_TOKEN   — token with Pages:Edit on the account
#   secrets.CLOUDFLARE_ACCOUNT_ID  — Cloudflare account id
#   vars.STAGING_SERVER_URL        — save API base, e.g. https://er-save-api-staging.<sub>.workers.dev

on:
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    if: github.repository == 'Heraklines/elite-redux'
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          # No submodules: the standalone build needs only a handful of small
          # asset-metadata files (the big image/audio dirs ship via jsDelivr).
          # The upstream pokerogue-assets submodule pins a commit that isn't
          # always fetchable, so we vendor those files in deploy/standalone-assets.

      - uses: ./.github/actions/setup-deps

      - name: Stage standalone asset metadata
        run: |
          mkdir -p assets
          cp -v deploy/standalone-assets/* assets/
          echo "=== assets/ after stage ==="
          ls -la assets/

      - name: Write standalone login env
        run: |
          {
            echo "VITE_BYPASS_LOGIN=0"
            echo "VITE_SERVER_URL=${{ vars.STAGING_SERVER_URL }}"
            # Enable the in-game dev TEST SUITE on STAGING only (Dev Scenarios menu,
            # Pass/Fail, Send Logs). Production's Cloudflare Pages build does NOT set
            # this, so the suite never activates there. See CLAUDE.md.
            echo "VITE_DEV_TOOLS=1"
          } > .env.standalone.local

      # ER (#431): resolve the CURRENT er-assets HEAD so this deploy's
      # _redirects pin can never be stale. The pin used to be bumped by hand;
      # a forgotten bump = players kept old art/audio (or 404'd brand-new
      # assets) for days - the single biggest source of "stale cache" reports.
      # Best-effort: on API failure the committed pin is used (never blocks a
      # deploy, worst case is the old manual-bump behavior).
      - name: Resolve er-assets HEAD for the jsDelivr pin
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(gh api repos/Heraklines/er-assets/commits/main --jq .sha || true)
          if echo "$SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "ER_ASSETS_SHA=$SHA" >> "$GITHUB_ENV"
            echo "er-assets pin for this deploy: $SHA"
          else
            echo "WARNING: could not resolve er-assets HEAD - keeping the committed pin."
          fi

      - name: Build standalone bundle
        run: |
          # Re-assert vendored asset metadata immediately before the build, in
          # case anything (submodule sync, install hooks) cleared assets/.
          mkdir -p assets
          cp -f deploy/standalone-assets/* assets/
          echo "=== assets/ right before build ==="
          ls -la assets/
          # build:standalone now also assembles dist (Cloudflare config copy,
          # sourcemap strip, empty manifest.json, ER_ASSETS_SHA re-pin) via
          # scripts/assemble-cloudflare-dist.mjs - same path production uses.
          pnpm build:standalone
        env:
          NODE_ENV: production

      - name: Verify assembled dist
        run: |
          for f in _redirects _headers service-worker.js manifest.json version.json; do
            test -f "dist/$f" || { echo "MISSING dist/$f"; exit 1; }
          done
          echo "=== er-assets pins in dist/_redirects ==="
          grep -o 'er-assets@[0-9a-f]*' dist/_redirects | sort -u

      - name: Deploy to Cloudflare Pages (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name elite-redux-staging --branch staging --commit-dirty=true
