# Base settings to use
# Note that the `_cfg` key isn't part of ls-lint's configuration, it's just a YAML anchor for reuse.
_cfg: &cfg
   .ps1: kebab-case
   .ts: kebab-case
   .js: kebab-case
   .*.ts: kebab-case
   .*.js: kebab-case
   .dir: kebab-case | regex:.+\.local
   .py: snake_case # python files should always use snake_case

ls:
   <<: *cfg
   src: &src
      <<: *cfg
      .dir: kebab-case | regex:@types
      .js: exists:0
   src/system/version-migration/versions:
      .ts: snake_case
      <<: *cfg
   test: *src
ignore:
   - .pnpm-store
   - node_modules
   - .vscode
   - .github
   - .git
   # Claude Code project config (skills etc.) - not source, own naming scheme.
   - .claude
   # Pre-existing exception: landed via a hook-bypassed cherry-pick before
   # ls-lint saw it; renaming now would break in-flight references.
   - test/tests/elite-redux/er-sectionA-dex-residuals.test.ts
   - assets
   - locales
   - dist
   # Transient agent scratch artifacts (never committed; own naming scheme).
   - scratch_view
   - scratchpad
   # Tier-1 minimal transport bundle output (hashed chunk names).
   - dist-coop-transport-min
   - .devcontainer
   - .wrangler
   - workers
   - "LICENSES"
   - vendor
   - _stats_deploy
   - stats/_stats_deploy
   # Gitignored local output tree (tester log pulls, soak failure artifacts, sprite renders).
   # The co-op soak driver names artifact dirs <timestamp>__seed-<s>__wave-<w> to match the
   # dev-logs remote FILE naming convention - never lint generated output.
   - dev-logs