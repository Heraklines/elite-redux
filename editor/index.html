<!DOCTYPE html>
<!--
  Elite Redux — team balancing editor.
  Static SPA: reads game data from public GitHub raw; commits edits via the
  er-editor-api Worker. Host on Cloudflare Pages. See editor/README.md.
  Tabs: Egg Moves | Species (egg tier + starter cost) | Items | Trainers.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>Elite Redux — Balancing Editor</title>
    <style>
      :root {
        --bg: #16161e; --panel: #1e1e2a; --panel2: #262633; --line: #353548;
        --text: #e6e6f0; --muted: #9a9ab0; --accent: #b3245c; --ok: #2fae66;
        --warn: #d8aa3a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--text);
        font: 14px/1.45 system-ui, sans-serif;
      }
      header {
        position: sticky; top: 0; z-index: 10; background: var(--panel);
        border-bottom: 1px solid var(--line); padding: 10px 16px;
        display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      }
      header h1 { font-size: 16px; margin: 0 12px 0 0; }
      input, select, button {
        background: var(--panel2); color: var(--text); border: 1px solid var(--line);
        border-radius: 6px; padding: 6px 8px; font: inherit;
      }
      #search { flex: 1; min-width: 160px; }
      button { cursor: pointer; }
      button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
      button:disabled { opacity: 0.5; cursor: default; }
      #status { margin-left: auto; color: var(--muted); }
      nav.tabs {
        display: flex; gap: 4px; padding: 8px 16px 0; background: var(--panel);
        border-bottom: 1px solid var(--line); overflow-x: auto;
      }
      nav.tabs button {
        border-radius: 8px 8px 0 0; border-bottom: none; padding: 7px 14px;
        background: var(--panel2); color: var(--muted); flex: none;
      }
      nav.tabs button.active { background: var(--bg); color: var(--text); font-weight: 600; }
      nav.tabs button .dot { color: var(--accent); margin-left: 4px; }
      #grid {
        display: grid; gap: 10px; padding: 16px;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      }
      #grid.wide { grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); }
      .card {
        background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
        padding: 10px; display: flex; gap: 10px; align-items: flex-start; overflow: hidden;
      }
      .card.dirty { border-color: var(--accent); }
      .card img { width: 56px; height: 56px; image-rendering: pixelated; object-fit: contain; flex: none; background: #0d0d14; border-radius: 6px; }
      .card .body { flex: 1; min-width: 0; }
      .card .name { font-weight: 600; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .card .name small { color: var(--muted); font-weight: 400; }
      .badges { display: inline-flex; gap: 4px; margin-left: 6px; vertical-align: 1px; }
      .badge {
        font-size: 11px; font-weight: 700; padding: 1px 6px; border-radius: 10px;
        background: var(--panel2); border: 1px solid var(--line); color: var(--muted);
      }
      .badge.tier-OU { color: #ff7f7f; border-color: #ff7f7f; }
      .badge.tier-UU { color: #ffb360; border-color: #ffb360; }
      .badge.tier-RU { color: #ffe08a; border-color: #ffe08a; }
      .badge.tier-PU { color: #9fd89f; border-color: #9fd89f; }
      .badge.tier-NU { color: #9ab8e8; border-color: #9ab8e8; }
      .slots { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
      .slots .slot { width: 100%; min-width: 0; padding: 5px 7px; }
      .fields { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      .fields label { color: var(--muted); font-size: 12px; display: flex; gap: 5px; align-items: center; }
      .fields input[type="number"] { width: 74px; }
      .empty { color: var(--muted); padding: 40px; text-align: center; }
      .section {
        background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
        padding: 14px; margin: 16px; max-width: 980px;
      }
      .section h2 { font-size: 15px; margin: 0 0 10px; }
      .section p.hint { color: var(--muted); font-size: 12px; margin: 4px 0 10px; }
      .knob-table { border-collapse: collapse; }
      .knob-table th { text-align: left; font-size: 13px; color: var(--muted); padding: 8px 22px 8px 0; }
      .knob-table tbody th { color: var(--text); font-size: 14px; text-transform: capitalize; }
      .knob-table td { padding: 8px 22px 8px 0; }
      .knob-cell { display: flex; gap: 8px; align-items: center; }
      .knob-cell input { width: 84px; font-size: 15px; padding: 7px 9px; }
      .badge.override { color: var(--accent); border-color: var(--accent); }
      .tr-reset { padding: 3px 8px; font-size: 12px; }
      .qm {
        display: inline-block; width: 16px; height: 16px; line-height: 16px; text-align: center;
        border-radius: 50%; background: var(--panel2); border: 1px solid var(--line);
        font-size: 11px; cursor: help; color: var(--muted);
      }
      .chips { display: flex; gap: 6px; }
      .chip { border-radius: 14px; padding: 4px 12px; font-size: 12px; color: var(--muted); }
      .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
      .factory-list { display: grid; gap: 6px; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); margin: 16px; }
      .factory-item {
        display: flex; gap: 8px; align-items: center; background: var(--panel);
        border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px;
        cursor: pointer; text-align: left; font: inherit; color: var(--text);
      }
      .factory-item:hover { border-color: var(--muted); }
      .factory-item img { width: 36px; height: 36px; image-rendering: pixelated; object-fit: contain; flex: none; background: #0d0d14; border-radius: 6px; }
      .factory-item .fname { display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
      .factory-item .fname small { color: var(--muted); }
      .factory-item .state { margin-left: auto; font-size: 11px; font-weight: 700; color: var(--ok); white-space: nowrap; }
      .factory-item.out { opacity: 0.75; background: #2a1d22; }
      .factory-item.out .state { color: #e0556a; }
      .factory-item.out img { filter: grayscale(1); }
      .factory-item.dirty { border-color: var(--accent); }
      .dyn { color: var(--warn); font-size: 11px; }
      .knob-row2 {
        display: flex; gap: 10px; align-items: center; padding: 7px 0;
        border-bottom: 1px solid var(--line); flex-wrap: wrap;
      }
      .knob-row2:last-child { border-bottom: none; }
      .knob-row2 .klabel { width: 290px; min-width: 200px; }
      .knob-row2 .klabel small { display: block; color: var(--muted); font-size: 11px; }
      .knob-row2 input[type="text"] { width: 320px; font-family: ui-monospace, monospace; font-size: 13px; }
      .knob-row2.dirty { background: rgba(179, 36, 92, 0.07); }
      .knob-row2 .warn-badge { color: var(--warn); font-size: 11px; font-weight: 700; }
      .map-rows { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 280px; }
      .map-rows .map-row { display: flex; gap: 8px; align-items: center; }
      .map-rows .map-row .mkey { width: 140px; color: var(--muted); font-size: 12px; }
      /* Factory set editor */
      .factory-wrap { display: flex; flex-direction: column; gap: 0; }
      .factory-item .toggle { margin-left: auto; flex: none; font-size: 11px; font-weight: 700; }
      .factory-item .toggle.in { color: var(--ok); border-color: var(--ok); }
      .factory-item .toggle.out-b { color: #e0556a; border-color: #e0556a; }
      .set-panel {
        background: var(--panel2); border: 1px solid var(--line); border-top: none;
        border-radius: 0 0 8px 8px; padding: 8px 10px; display: flex; flex-direction: column; gap: 6px;
      }
      .set-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
      .set-row input.set-move { width: 150px; padding: 4px 6px; font-size: 12px; }
      .set-row select.set-slot { padding: 4px 6px; font-size: 12px; }
      .set-row button { padding: 3px 8px; font-size: 12px; }
      .set-actions { display: flex; gap: 8px; align-items: center; }
      .badge.edited { color: var(--warn); border-color: var(--warn); }
      /* Add a Mon */
      .mon-form { display: grid; gap: 14px; grid-template-columns: 1fr 1fr; max-width: 1100px; }
      .mon-form .full { grid-column: 1 / -1; }
      .mon-form fieldset { border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; min-width: 0; }
      .mon-form legend { color: var(--muted); font-size: 12px; padding: 0 6px; }
      .mon-form label { display: inline-flex; gap: 6px; align-items: center; color: var(--muted); font-size: 12px; margin: 4px 10px 4px 0; }
      .mon-form input[type="number"] { width: 70px; }
      .sprite-slots { display: flex; gap: 12px; flex-wrap: wrap; }
      .sprite-slot { display: flex; flex-direction: column; gap: 4px; align-items: center; font-size: 11px; color: var(--muted); }
      .sprite-slot canvas { width: 96px; height: 96px; image-rendering: pixelated; background: #0d0d14; border: 1px solid var(--line); border-radius: 6px; }
      .mon-list { display: grid; gap: 6px; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); margin-top: 8px; }
      .mon-list button { display: flex; gap: 8px; align-items: center; text-align: left; }
      /* ---- Custom Trainers ---- */
      .ctr-open.on { border-color: var(--accent); background: var(--panel2); font-weight: 600; }
      .ctr-open.dirty { border-color: var(--accent); }
      /* Two-line list card: header (name + #id) over a content row (trainer sprite + team icons). */
      .mon-list .ctr-open { display: flex; flex-direction: column; align-items: stretch; gap: 5px; }
      .ctr-card-head { display: flex; align-items: baseline; gap: 6px; }
      .ctr-card-head small { color: var(--muted); font-weight: 400; }
      .ctr-card-body { display: flex; align-items: center; gap: 8px; min-height: 46px; }
      .ctr-card-sprite { flex: none; display: inline-flex; align-items: flex-end; justify-content: center; min-width: 20px; min-height: 44px; image-rendering: pixelated; color: var(--muted); font-size: 11px; }
      .ctr-card-team { display: flex; flex-wrap: wrap; gap: 3px; align-items: center; }
      .ctr-card-mon { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; background: #0d0d14; border: 1px solid var(--line); border-radius: 5px; overflow: hidden; flex: none; }
      .ctr-card-mon img { width: 26px; height: 26px; image-rendering: pixelated; object-fit: contain; }
      .ctr-form fieldset { border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; margin: 8px 0; min-width: 0; }
      .ctr-form legend { color: var(--muted); font-size: 12px; padding: 0 6px; }
      .ctr-form label { font-size: 12px; margin-right: 10px; display: inline-block; }
      .ctr-member { background: var(--panel2); }
      .ctr-member .ctr-moves, .ctr-member .ctr-fusion, .ctr-member .ctr-held { margin-top: 6px; }
      .ctr-held-row { display: inline-flex; gap: 3px; align-items: center; margin-right: 8px; }
      .ctr-sprite-preview { display: inline-flex; gap: 8px; align-items: flex-end; vertical-align: bottom; margin-left: 8px; min-height: 48px; }
      .ctr-sprite-frame { background-color: var(--panel2); border: 1px solid var(--line); border-radius: 4px; image-rendering: pixelated; color: var(--muted); font-size: 12px; display: inline-flex; align-items: center; justify-content: center; min-width: 24px; min-height: 24px; }
      .ctr-warn { color: var(--warn, #d68910); font-size: 12px; margin-top: 8px; line-height: 1.5; }
      .ctr-note { color: var(--muted); font-size: 12px; margin-top: 6px; line-height: 1.5; }
      /* Major-section separators (Identity / Spawn gates / Team). */
      .ctr-form fieldset.ctr-sec { border-top: 2px solid var(--accent); }
      .ctr-form fieldset.ctr-sec legend { color: var(--text); font-weight: 700; font-size: 13px; }
      /* Battle-music picker row. */
      .ctr-bgm-row { margin-top: 8px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
      .ctr-bgm-row select { max-width: 260px; }
      #ctr-bgm-play, #ctr-bgm-stop { padding: 6px 10px; }
      /* Collapsible team members. */
      .ctr-member { margin: 8px 0; border: 1px solid var(--line); border-left: 3px solid var(--accent); }
      .ctr-member + .ctr-member { margin-top: 12px; }
      .ctr-mem-sum { cursor: pointer; user-select: none; }
      .ctr-mem-sum:hover { color: var(--accent); }
      .ctr-mem-sum:hover .ctr-mem-caret { color: var(--accent); border-color: var(--accent); }
      .ctr-mem-caret { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; font-size: 14px; color: var(--muted); border: 1px solid var(--line); border-radius: 4px; margin-right: 4px; vertical-align: middle; }
      .ctr-mem-sum small { color: var(--muted); font-weight: 400; margin-left: 6px; }
      .ctr-moves-head { margin-top: 8px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
      .ctr-moves-head select { max-width: 240px; }
      .ctr-move-err { color: #e0556a; font-size: 12px; margin-top: 5px; line-height: 1.45; }
      .ctr-insanity { margin-top: 8px; border-left: 3px solid var(--line); padding: 6px 8px; background: rgba(255,255,255,.025); }
      .ctr-insanity.on { border-left-color: #e0556a; background: rgba(224,85,106,.07); }
      .ctr-insanity-toggle { font-weight: 700; color: var(--text); }
      .ctr-insanity.on .ctr-insanity-toggle { color: #ef8293; }
      .ctr-insanity-fields { display: flex; align-items: center; flex-wrap: wrap; gap: 7px 10px; margin-top: 7px; }
      .ctr-insanity-fields input { width: 170px; max-width: 100%; }
      .ctr-insanity-fields .hint { flex-basis: 100%; margin: 0; }
      @media (max-width: 760px) {
        .ctr-insanity-fields label { width: 100%; display: grid; grid-template-columns: 72px minmax(0, 1fr); align-items: center; }
        .ctr-insanity-fields input { width: 100%; min-width: 0; }
      }
      /* Per-member Shiny Lab effect picker + swatch approximation. */
      .ctr-shiny { margin-top: 8px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      .ctr-shiny-lbl { color: var(--muted); font-size: 12px; }
      .ctr-shiny select { max-width: 150px; }
      .ctr-shiny-swatch { display: inline-flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .ctr-shiny-chip { display: inline-flex; gap: 4px; align-items: center; font-size: 12px; color: var(--muted); }
      .ctr-shiny-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; border: 1px solid var(--line); }
      /* Dialogue lines (intro / victory / defeat) + the trainer sprite-effect picker. */
      .ctr-intro-row, .ctr-effect-row { margin-top: 8px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      .ctr-effect-row select { max-width: 180px; }
      .ctr-preview-effect { margin-top: 6px; font-size: 12px; color: var(--muted); display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
      /* ---- Media assets ---- */
      .asset-grid { display: grid; grid-template-columns: minmax(320px, 1fr) minmax(320px, 1fr); gap: 16px; padding: 16px; max-width: 1280px; }
      .asset-panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; min-width: 0; }
      .asset-panel h2 { margin: 0 0 10px; font-size: 15px; }
      .asset-form { display: grid; gap: 10px; }
      .asset-form label { display: grid; gap: 4px; color: var(--muted); font-size: 12px; }
      .asset-form textarea { min-height: 100px; resize: vertical; background: var(--panel2); color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 8px; font: 12px/1.5 ui-monospace, monospace; }
      .asset-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      .asset-row > label { display: inline-flex; flex-direction: row; align-items: center; gap: 5px; }
      .asset-catalog { display: grid; gap: 6px; max-height: 430px; overflow: auto; }
      .asset-track { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: center; padding: 8px; border: 1px solid var(--line); border-radius: 6px; background: var(--panel2); }
      .asset-track strong, .asset-track small { display: block; overflow-wrap: anywhere; }
      .asset-track small { color: var(--muted); }
      .license { display: inline-block; margin-left: 5px; padding: 1px 5px; border: 1px solid var(--line); border-radius: 4px; color: var(--muted); font-size: 10px; text-transform: uppercase; }
      .license.cc-by, .license.cc0, .license.original { color: var(--ok); border-color: var(--ok); }
      .license.youtube-standard, .license.unknown { color: var(--warn); border-color: var(--warn); }
      .sprite-previews { display: grid; grid-template-columns: repeat(2, minmax(120px, 1fr)); gap: 8px; }
      .sprite-preview { min-height: 150px; display: grid; place-items: center; background: #0d0d14; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
      .sprite-preview img { max-width: 100%; max-height: 220px; image-rendering: pixelated; object-fit: contain; }
      .asset-jobs { display: grid; gap: 5px; margin-top: 10px; }
      .asset-job { display: flex; justify-content: space-between; gap: 8px; color: var(--muted); font-size: 12px; }
      @media (max-width: 820px) { .asset-grid { grid-template-columns: 1fr; } }
      /* Trainer sprite-gender radio picker. */
      .ctr-gender { font-size: 12px; display: inline-flex; gap: 8px; align-items: center; }
      .ctr-gender label { margin-right: 0; }
      /* Weighted-slot + slot-fill control row (the per-member slot header controls). */
      .ctr-slot-ctrls { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
      .ctr-slotprob, .ctr-weighted-lbl { display: inline-flex; gap: 6px; align-items: center; font-size: 12px; color: var(--muted); }
      .ctr-var-ctrls { display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap; font-size: 12px; color: var(--muted); padding: 4px 8px; border: 1px solid var(--line); border-radius: 6px; background: var(--panel2); }
      .ctr-var-ctrls button { padding: 2px 8px; }
      .ctr-var-n { min-width: 30px; text-align: center; }
      .ctr-var-odds { color: var(--accent); }
      /* Fusion preview (two sprites + the generated fused name). */
      .ctr-fusion-preview { margin-top: 6px; padding: 6px 8px; border: 1px solid var(--line); border-radius: 6px; background: var(--panel2); }
      .ctr-fusion-sprites { display: flex; gap: 6px; align-items: center; }
      .ctr-fusion-plus { color: var(--muted); font-size: 16px; }
      .ctr-fusion-name { font-size: 12px; margin-top: 2px; }
      /* Two-column layout: form on the left, sticky preview panel on the right.
         Degrades to a single column under ~1100px (panel drops below the form). */
      .ctr-layout { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 16px; align-items: start; }
      .ctr-layout-main { min-width: 0; }
      .ctr-preview-panel { position: sticky; top: 12px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel2); padding: 10px 12px; align-self: start; }
      .ctr-preview-sec { padding: 8px 0; border-bottom: 1px solid var(--line); }
      .ctr-preview-sec:last-child { border-bottom: none; }
      .ctr-preview-h { color: var(--muted); font-size: 12px; font-weight: 700; margin-bottom: 6px; }
      .ctr-preview-mon { min-height: 40px; }
      .ctr-preview-shiny { margin-top: 6px; }
      .ctr-preview-bgm { font-size: 12px; }
      .ctr-bgm-live { color: var(--accent); font-size: 11px; }
      @media (max-width: 1100px) {
        .ctr-layout { grid-template-columns: minmax(0, 1fr); }
        .ctr-preview-panel { position: static; }
      }
      /* Trainer-class Browse modal (visual sprite picker). */
      .ctr-modal-overlay {
        position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.6);
        display: flex; align-items: center; justify-content: center; padding: 24px;
      }
      .ctr-modal {
        background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
        width: min(900px, 100%); max-height: 86vh; display: flex; flex-direction: column; overflow: hidden;
      }
      .ctr-modal-head {
        display: flex; gap: 10px; align-items: center; padding: 12px 14px;
        border-bottom: 1px solid var(--line);
      }
      .ctr-modal-head b { font-size: 14px; }
      .ctr-modal-filter { flex: 1; min-width: 120px; }
      .ctr-modal-close { padding: 5px 10px; }
      .ctr-modal-grid {
        overflow-y: auto; padding: 12px; display: grid; gap: 8px;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      }
      .ctr-modal-cell {
        display: flex; flex-direction: column; gap: 4px; align-items: center; justify-content: flex-end;
        padding: 8px 6px; background: var(--panel2); border: 1px solid var(--line); border-radius: 8px;
        color: var(--text); text-align: center; min-height: 96px; cursor: pointer;
      }
      .ctr-modal-cell:hover { border-color: var(--accent); }
      .ctr-modal-cell .ctr-sprite-frame { min-width: 32px; min-height: 40px; background: #0d0d14; }
      .ctr-cell-name { font-size: 11px; color: var(--muted); word-break: break-word; }
      /* ---- Pokedex Editor (Learnsets / TMs / Abilities) ---- */
      .pd { display: grid; grid-template-columns: 280px 1fr; gap: 0; height: calc(100vh - 132px); }
      .pd-list { overflow-y: auto; border-right: 1px solid var(--line); padding: 8px; display: flex; flex-direction: column; gap: 3px; }
      .pd-sp {
        display: flex; gap: 8px; align-items: center; text-align: left; padding: 5px 8px;
        background: transparent; border: 1px solid transparent; border-radius: 7px; color: var(--text); width: 100%;
      }
      .pd-sp:hover { background: var(--panel2); }
      .pd-sp.sel { background: var(--panel2); border-color: var(--accent); }
      .pd-sp img { width: 30px; height: 30px; image-rendering: pixelated; object-fit: contain; flex: none; background: #0d0d14; border-radius: 5px; }
      .pd-sp .nm { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .pd-sp .nm small { color: var(--muted); }
      .pd-sp .pd-dot { color: var(--accent); flex: none; }
      .pd-main { overflow-y: auto; padding: 14px 18px; }
      .pd-head { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
      .pd-head img { width: 56px; height: 56px; image-rendering: pixelated; object-fit: contain; background: #0d0d14; border-radius: 7px; flex: none; }
      .pd-title { font-size: 17px; font-weight: 700; }
      .pd-title small { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 6px; }
      .pd-revert { margin-left: auto; padding: 5px 11px; }
      .evo-chain { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin: -6px 0 14px; padding: 8px 10px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; }
      .evo-chain .evo-here { font-weight: 700; padding: 4px 8px; }
      .evo-chain .evo-arrow { color: var(--muted); }
      .evo-chip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px 3px 4px; background: var(--panel2); border: 1px solid var(--line); border-radius: 14px; color: var(--text); font-size: 13px; }
      .evo-chip:hover { border-color: var(--accent); }
      .evo-chip.dirty { border-color: var(--accent); color: var(--accent); }
      .evo-chip img { width: 22px; height: 22px; image-rendering: pixelated; object-fit: contain; }
      .pd-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
      .pd-col-head { display: flex; gap: 8px; align-items: center; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; flex-wrap: wrap; }
      .pd-col-head input, .pd-col-head select { font-size: 12px; padding: 4px 6px; }
      .pd-col-head input[type="search"] { flex: 1; min-width: 90px; }
      .pd-col-head input[type="number"] { width: 56px; }
      .pal { display: flex; flex-direction: column; gap: 3px; max-height: calc(100vh - 280px); overflow-y: auto; padding-right: 4px; }
      .pal-move {
        display: flex; flex-direction: column; gap: 1px; text-align: left; padding: 5px 8px; cursor: grab;
        background: var(--panel); border: 1px solid var(--line); border-radius: 6px; color: var(--text);
      }
      .pal-move:hover { border-color: var(--accent); }
      .pal-move .mname { font-weight: 600; font-size: 13px; }
      .pal-move .mmeta { color: var(--muted); font-size: 11px; }
      .pal-move .tcol { font-weight: 700; }
      .ls-list, .tm-list {
        display: flex; flex-direction: column; gap: 4px; min-height: 120px; padding: 8px;
        border: 1px dashed var(--line); border-radius: 8px; background: var(--panel);
      }
      .ls-list.drag, .tm-list.drag { border-color: var(--accent); background: rgba(179,36,92,0.06); }
      .ls-row, .tm-row { display: flex; gap: 8px; align-items: center; }
      .ls-row .ls-level { width: 58px; text-align: center; }
      .ls-row .ls-lv1 { color: var(--warn); font-weight: 700; font-size: 11px; }
      .ls-move, .tm-move { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .ls-move small, .tm-move small { color: var(--muted); }
      .ls-del, .tm-del { padding: 2px 8px; font-size: 12px; color: #e0556a; border-color: #e0556a; }
      .pd-empty { color: var(--muted); padding: 6px 2px; font-size: 12px; }
      /* Abilities */
      .abil-group-title { font-size: 13px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em; margin: 16px 0 8px; }
      .abil-group-title:first-of-type { margin-top: 4px; }
      .abil-slots { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); max-width: 980px; }
      .abil-slot { background: var(--panel); border: 1px solid var(--line); border-radius: 9px; padding: 12px; }
      .abil-slot.hidden-slot { border-style: dashed; }
      .abil-slot > label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 7px; }
      .combo { position: relative; }
      .abil-input { width: 100%; }
      .abil-drop {
        position: absolute; z-index: 20; left: 0; right: 0; top: 100%; margin-top: 3px; max-height: 280px; overflow-y: auto;
        background: var(--panel2); border: 1px solid var(--accent); border-radius: 8px; display: none;
      }
      .abil-drop.open { display: block; }
      .abil-opt { display: block; width: 100%; text-align: left; padding: 6px 9px; background: transparent; border: none; border-bottom: 1px solid var(--line); color: var(--text); border-radius: 0; }
      .abil-opt:hover { background: var(--accent); color: #fff; }
      .abil-opt .aname { font-weight: 600; display: block; }
      .abil-opt .adesc { color: var(--muted); font-size: 11px; display: block; }
      .abil-opt:hover .adesc { color: #ffd9e5; }
      .abil-cur { margin-top: 8px; }
      .abil-cur .acur-name { font-weight: 700; }
      .abil-cur .acur-desc { color: var(--muted); font-size: 12px; margin-top: 2px; }
    </style>
  </head>

    <header>
      <h1>⚖️ ER Balancing Editor</h1>
      <input id="search" type="search" placeholder="Search…" autocomplete="off" />
      <select id="sort" title="Sort the species list">
        <option value="name">Sort: Name</option>
        <option value="dex">Sort: Dex No.</option>
        <option value="usage">Sort: Usage Tier</option>
      </select>
      <input id="author" type="text" placeholder="Your name (for the commit)" style="width:170px" />
      <input id="password" type="password" placeholder="Editor password" style="width:150px" autocomplete="off" autocapitalize="off" spellcheck="false" />
      <button id="undo" type="button" title="Undo the last egg-move change (one step back)" disabled>↶ Undo</button>
      <button id="save" type="button" class="primary" disabled>Save 0 changes</button>
      <button id="deploy" type="button" title="Commit changes (if any) and rebuild + deploy the staging site">
        Commit &amp; Deploy
      </button>
      <span id="status">Loading…</span>
    </header>
    <nav class="tabs">
      <button type="button" data-tab="eggmoves" class="active">🥚 Egg Moves</button>
      <button type="button" data-tab="species">📊 Species</button>
      <button type="button" data-tab="learnsets">📚 Learnsets</button>
      <button type="button" data-tab="tms">💿 TMs</button>
      <button type="button" data-tab="abilities">✨ Abilities</button>
      <button type="button" data-tab="items">🎒 Items</button>
      <button type="button" data-tab="trainers">🤺 Trainers</button>
      <button type="button" data-tab="customtrainers">🧑‍🏫 Custom Trainers</button>
      <button type="button" data-tab="assets">🎵 Assets</button>
      <button type="button" data-tab="game">🎛 Game</button>
      <button type="button" data-tab="addmon">➕ Add a Mon</button>
    </nav>
    <main id="content"></main>
    <script src="./app.js"></script>
  </body>
