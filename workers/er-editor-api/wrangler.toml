# Cloudflare Worker — Elite Redux team data editor backend.
# Commits the team editor's changes (egg moves, later learnsets/rarity) to the
# repo branch via the GitHub Contents API. The editor SPA reads data straight
# from public GitHub raw; only writes hit this Worker.
#
# Deploy:
#   cd workers/er-editor-api
#   npx wrangler secret put GITHUB_TOKEN      # fine-grained PAT: Contents + Actions, read+write on the repo
#   npx wrangler secret put EDITOR_PASSWORD   # shared team password
#   npx wrangler deploy

name = "er-editor-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Non-secret config. Set the branch the editor should commit to.
[vars]
GITHUB_REPO = "Heraklines/elite-redux"
GITHUB_BRANCH = "feat/elite-redux-port"
GITHUB_WORKFLOW_FILE = "deploy-staging.yml"
MEDIA_IMPORT_WORKFLOW_FILE = "deploy-staging.yml"
MEDIA_IMPORT_BRANCH = "feat/elite-redux-port"
ALLOWED_ORIGIN = "*"
# Sprite repo for the Add-a-Mon upload route (/upload-assets).
ASSETS_REPO = "Heraklines/er-assets"
ASSETS_BRANCH = "main"

[[r2_buckets]]
binding = "MEDIA_UPLOADS"
bucket_name = "er-editor-media-uploads"

# Secrets (set via `wrangler secret put`, NOT here):
#   GITHUB_TOKEN     — fine-grained PAT, Contents: read & write + Actions: read & write (deploy
#                      button fires a workflow_dispatch). Must cover BOTH
#                      GITHUB_REPO and ASSETS_REPO (sprite uploads land there).
#   EDITOR_PASSWORD  — shared password the editor sends with each save
