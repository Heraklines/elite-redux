# Cloudflare Worker — ISOLATED STAGING for the cloud-save/account API.
# Separate worker + separate D1 from production; safe to test against without
# touching real player data. Deploy: wrangler deploy --config wrangler.staging.toml
name = "er-save-api-staging"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[d1_databases]]
binding = "DB"
database_name = "er-saves-staging"
database_id = "7dc09f64-6810-4756-8c0f-e44f7d382eed"

# Player-telemetry ML capture sink (#player-telemetry). Staging-only R2 bucket; the client's
# compressed (state, action) event batches are written here verbatim by POST /telemetry/ingest.
# NOTE: R2 must be enabled on the Cloudflare account and the bucket created BEFORE this deploys:
#   npx wrangler r2 bucket create er-telemetry-staging
# Until then the binding is harmless to define but a deploy will fail if the bucket is missing, so
# create the bucket first (see the worker README "Player telemetry" section).
[[r2_buckets]]
binding = "TELEMETRY"
bucket_name = "er-telemetry-staging"

[vars]
ALLOWED_ORIGIN = "*"
MIN_USERNAME_LENGTH = "3"
MIN_PASSWORD_LENGTH = "6"
PUBLISH_USAGE_TIERS = "0"
USAGE_TIER_SOURCE = "staging"
USAGE_TIER_MIN_PLAYERS = "500"
USAGE_TIER_MIN_RUNS = "5000"

# Cron may be present for parity, but PUBLISH_USAGE_TIERS=0 + USAGE_TIER_SOURCE=staging
# makes staging read-only for the shared er-assets usage-tiers.json feed.
[triggers]
crons = ["0 4 * * *"]

[observability]
enabled = true
