# Cloudflare Worker — Elite Redux cloud-save + account API (#229).
# Deploy: see README.md. Free tier (Workers + D1) hosts ~1,000-1,500 daily-active
# players with debounced sync; the $5/mo Workers Paid plan scales to ~40,000.

name = "er-save-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# D1 (SQLite) database holding accounts + saves. Create it once with:
#   npx wrangler d1 create er-saves
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "er-saves"
database_id = "b2fae947-6971-45e7-b287-d42648fd0a30"

# Secrets (DO NOT put real values here — set them with `wrangler secret put`):
#   npx wrangler secret put SESSION_SECRET   # long random string; signs session tokens
#   npx wrangler secret put COOP_IDENTITY_SECRET # same dedicated secret on er-coop-api
# SESSION_SECRET is read from the encrypted secret store, not from [vars].

[vars]
# Optional: restrict which site origin may call the API. "*" (or unset) allows
# any origin. For a locked-down deploy set this to your Pages URL, e.g.
# "https://elite-redux.pages.dev".
ALLOWED_ORIGIN = "*"
# Minimum lengths enforced server-side at registration.
MIN_USERNAME_LENGTH = "3"
MIN_PASSWORD_LENGTH = "6"
PUBLISH_USAGE_TIERS = "1"
USAGE_TIER_SOURCE = "prod"
USAGE_TIER_MIN_PLAYERS = "500"
USAGE_TIER_MIN_RUNS = "5000"

# ER (#384): nightly usage-tier aggregation - ONE invocation per day.
[triggers]
crons = ["0 4 * * *"]
