# Cloudflare Worker - isolated staging tournament telemetry and state.
# Uses the staging save API as the token verifier, so no production signing
# secret or D1 database is shared with this environment.

name = "er-telemetry-staging"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[d1_databases]]
binding = "DB"
database_name = "er-telemetry-staging"
database_id = "5655c98e-4de8-48c1-865c-6bf5744f752a"

[[services]]
binding = "AUTH_API"
service = "er-save-api-staging"

[vars]
SAVE_API_URL = "https://er-save-api-staging.heraklines.workers.dev"
EDITOR_API_URL = "https://er-editor-api.heraklines.workers.dev"
ALLOWED_ORIGIN = "*"
TOURNAMENT_ADMIN_UIDS = "2"

[observability]
enabled = true
