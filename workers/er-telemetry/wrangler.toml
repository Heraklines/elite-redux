# Cloudflare Worker — Elite Redux Showdown battle TELEMETRY (Task D5).
# A DEDICATED worker + D1 database, separate from er-saves (which is under DB-cap pressure).
# NOT DEPLOYED by this change — activation is a maintainer step (see the plan doc's
# "Phase D wave 2 — ACTIVATION NOTES").

name = "er-telemetry"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# D1 (SQLite) database holding one row per showdown match. Create it once with:
#   npx wrangler d1 create er-telemetry
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "er-telemetry"
database_id = "e75604f0-bef9-49ef-aba7-d93779e48b8f"   # set after `wrangler d1 create er-telemetry`

# Secrets (set with `wrangler secret put`, DO NOT commit real values):
#   npx wrangler secret put SESSION_SECRET          # MUST equal er-save-api's SESSION_SECRET
#   npx wrangler secret put EDITOR_PASSWORD         # MUST equal er-editor-api's EDITOR_PASSWORD (team
#                                                   # editor password) — lets any teammate administer
#                                                   # tournaments via the editor page (X-Editor-Auth).
#   npx wrangler secret put SHOWDOWN_GRANT_SECRET   # MUST equal er-save-api's SHOWDOWN_GRANT_SECRET
#                                                   # (authenticates the server-to-server reward push).
# SESSION_SECRET is the SHARED HMAC key so the client's existing session token verifies here.

[vars]
# Optional: restrict which site origin may post telemetry. "*" (or unset) allows any origin.
ALLOWED_ORIGIN = "*"
# Showdown Tournament (P1): comma-separated list of ADMIN account uids (the token `uid`,
# a stable numeric account id) allowed to create/close/cancel/resolve tournaments. Empty
# / unset = no admins (creation locked). Set the maintainer's account uid here. NOTE: the
# EDITOR_PASSWORD secret is now an ALTERNATIVE admin credential (the whole team can use it),
# so this list is no longer the only way to grant admin.
TOURNAMENT_ADMIN_UIDS = "2"   # staging uid of Heraklines1 (maintainer): tournament create/close/cancel/resolve
# Base URL of the er-save-api worker (the settlement store). The tournament grant route pushes
# reward mutations there (POST /showdown/tournament-grant) for the login-sweep delivery.
SAVE_API_URL = "https://er-save-api-staging.heraklines.workers.dev"   # STAGING save worker: tournament grants must land where staging clients sweep; switch to prod er-save-api only at prod rollout
